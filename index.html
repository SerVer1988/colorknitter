  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
    // Если нет флага активной вязалки и нет данных от генератора — на генератор
    if (!localStorage.getItem('ck_has_sequence') && !localStorage.getItem('ck_from_generator')) {
      window.location.replace('generator.html');
    }
    function unlockSpeech() {
      const u = new SpeechSynthesisUtterance('');
      u.volume = 0;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
      document.removeEventListener('touchstart', unlockSpeech);
      document.removeEventListener('click', unlockSpeech);
    }
    document.addEventListener('touchstart', unlockSpeech);
    document.addEventListener('click', unlockSpeech);
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #0a0a0a; font-family: Arial, sans-serif; color: white; }
    body { display: flex; justify-content: center; align-items: flex-start; }
    #root { width: 100%; max-width: 440px; min-height: 100vh; display: flex; flex-direction: column; padding: 0 0 110px 0; }

    .logo-row { display: flex; justify-content: center; align-items: center; padding: 8px 0 4px; position: relative; }
    .logo-row img { height: 36px; width: auto; border-radius: 8px; }
    .logo-back { position: absolute; left: 12px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }

    .status-box { margin: 16px 12px; border: 2.5px solid #fff; border-radius: 999px; padding: 10px 20px; text-align: center; font-size: 18px; font-weight: 700; color: #fff; }

    .speed-row { display: flex; justify-content: center; gap: 8px; margin: 16px 12px; align-items: center; }
    .speed-btn { flex: 1; max-width: 64px; padding: 7px 0; border-radius: 999px; border: 2.5px solid transparent; background: transparent; color: #aaa; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .speed-btn.active { border-color: #fff; color: #fff; }

    .canvas-wrap { display: flex; justify-content: center; padding: 16px 12px; position: relative; }
    canvas { border-radius: 50%; display: block; }
    .sector-labels { position: absolute; top: 16px; left: 12px; right: 12px; bottom: 16px; pointer-events: none; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .sector-label { font-size: 2rem; font-weight: 900; color: white; text-shadow: 0 0 6px black, 0 0 3px black; display: flex; }
    .sector-label.tl { align-items: flex-start; justify-content: flex-start; padding: 10px 0 0 10px; }
    .sector-label.tr { align-items: flex-start; justify-content: flex-end; padding: 10px 10px 0 0; }
    .sector-label.bl { align-items: flex-end; justify-content: flex-start; padding: 0 0 10px 10px; }
    .sector-label.br { align-items: flex-end; justify-content: flex-end; padding: 0 10px 10px 0; }

    .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 440px; padding: 10px 20px 24px; background: #1a1a1a; border-top: 1px solid #2a2a2a; border-radius: 24px 24px 0 0; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    .bar-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, opacity 0.15s; }

    .bar-btn:disabled { opacity: 0.3; }
    .bar-btn img { width: 52px; height: 52px; border-radius: 50%; }
    .bar-btn.play img { width: 68px; height: 68px; }
    .bar-btn.active-radio img { filter: brightness(0) saturate(100%) invert(40%) sepia(80%) saturate(500%) hue-rotate(230deg); }

    .settings-panel { display: none; position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); width: calc(100% - 24px); max-width: 416px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 16px; z-index: 99; max-height: 70vh; overflow-y: auto; }
    .settings-panel.open { display: flex; flex-direction: column; gap: 14px; }

    input[type=range] { width: 100%; accent-color: #7c3aed; }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #ccc; }
    .toggle-switch { position: relative; width: 40px; height: 24px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #444; border-radius: 999px; cursor: pointer; transition: background 0.2s; }
    .toggle-slider:before { content:''; position:absolute; width:16px; height:16px; left:4px; top:4px; background:white; border-radius:50%; box-shadow:0 1px 3px rgba(0,0,0,.4); transition:transform 0.2s; }
    input:checked + .toggle-slider { background: #EFCA46; }
    input:checked + .toggle-slider:before { transform: translateX(16px); background: black; }
    input[type=range] { width: 100%; accent-color: #EFCA46; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .s-input-label { font-size: 12px; color: #aaa; margin-bottom: 4px; display: block; }
    input[type=number] { width: 100%; background: #111; border: 1.5px solid #333; border-radius: 8px; padding: 7px; text-align: center; font-size: 15px; color: white; outline: none; }
    input[type=number]:focus { border-color: #7c3aed; }

    .s-btn { width: 100%; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
    .s-btn-outline { background: transparent; border: 1.5px solid #444; color: #ccc; }
    .s-btn-primary { background: #7c3aed; color: white; }
    .s-btn-row { display: flex; gap: 8px; }
    .s-btn-row .s-btn { flex: 1; }
    .s-btn-secondary { background: #222; color: #ccc; border: 1.5px solid #333; }

    .saved-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
    .saved-item { background: #111; border: 1px solid #2a2a2a; border-radius: 10px; padding: 8px 10px; font-size: 12px; }
    .saved-item-top { display: flex; justify-content: space-between; color: #888; margin-bottom: 6px; }
    .saved-item-btns { display: flex; justify-content: flex-end; gap: 8px; }
    .s-btn-sm { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
    .s-btn-sm-ol { background: transparent; border: 1px solid #444; color: #ccc; }
    .s-btn-sm-del { background: #dc2626; color: white; }

    .opacity-row { display: flex; align-items: center; gap: 8px; }
    .divider { border: none; border-top: 1px solid #2a2a2a; }

    .goal-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #EFCA46; color: black; font-size: 28px; font-weight: 900; padding: 20px 36px; border-radius: 20px; z-index: 200; box-shadow: 0 4px 32px rgba(0,0,0,0.5); animation: popIn 0.3s ease; pointer-events: none; }
    @keyframes popIn { from { transform: translate(-50%,-50%) scale(0.7); opacity:0; } to { transform: translate(-50%,-50%) scale(1); opacity:1; } }
  </style>

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const STORAGE_KEY = 'ck_state_v1';
const SPEEDS = [0.5, 0.75, 1, 1.25, 2];

function saveToStorage(data) {
  // Пробуем сохранить с фото
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); return; } catch(e) {}
  // Если не влезло — сжимаем фото
  if (data.circleImage) {
    try {
      const img = new Image();
      img.src = data.circleImage;
      const c = document.createElement('canvas');
      c.width = 400; c.height = 400;
      c.getContext('2d').drawImage(img, 0, 0, 400, 400);
      const compressed = c.toDataURL('image/jpeg', 0.5);
      localStorage.setItem(STORAGE_KEY, JSON.stringify({...data, circleImage: compressed}));
      return;
    } catch(e) {}
  }
  // Совсем не влезло — сохраняем без фото
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({...data, circleImage: null})); } catch(_) {}
}
function loadFromStorage() {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch(_) { return null; }
}

function ColorKnitter() {
  const restored = loadFromStorage();

  const [sequence, setSequence]               = useState(restored?.sequence || []);
  const [currentIndex, setCurrentIndex]       = useState(restored?.currentIndex || 0);
  const [isPlaying, setIsPlaying]             = useState(false);
  const [speedMultiplier, setSpeedMultiplier] = useState(restored?.speedMultiplier || 1);
  const [targetSteps, setTargetSteps]         = useState(restored?.targetSteps || 0);
  const [findStep, setFindStep]               = useState(restored?.findStep || 1);
  const [savedStates, setSavedStates]         = useState(restored?.savedStates || []);
  const [remainingSteps, setRemainingSteps]   = useState(restored?.remainingSteps || 0);
  const [showNextLine, setShowNextLine]       = useState(restored?.showNextLine || false);
  const [circleImage, setCircleImage]         = useState(restored?.circleImage || null);
  const [imageOpacity, setImageOpacity]       = useState(restored?.imageOpacity ?? 0.55);
  const [showSettings, setShowSettings]       = useState(false);
  const [showSaved, setShowSaved]             = useState(false);
  const [radioPlaying, setRadioPlaying]       = useState(false);
  const [goalMessage, setGoalMessage]         = useState(false);

  const fileInputRef    = useRef(null);
  const imageInputRef   = useRef(null);
  const canvasRef       = useRef(null);
  const playIntervalRef = useRef(null);
  const stepCountRef    = useRef(0);
  const goalReachedRef  = useRef(false);
  const loadedImgRef    = useRef(null);
  const sequenceRef     = useRef(sequence);
  const audioRef        = useRef(null);
  sequenceRef.current   = sequence;

  useEffect(() => {
    audioRef.current = new Audio('https://pianosolo.streamguys1.com/live?listenerid=8b5691fb9de68c165068d33274d23ef1&awparams=companionAds%3Atrue&aw_0_req.gdpr=true&us_privacy=1YNN');
    audioRef.current.volume = 0.2;
    return () => { audioRef.current.pause(); };
  }, []);

  useEffect(() => {
    if (!audioRef.current) return;
    if (radioPlaying) audioRef.current.play().catch(()=>{});
    else audioRef.current.pause();
  }, [radioPlaying]);

  // Проверяем данные от генератора
  useEffect(() => {
    const fromGen = localStorage.getItem('ck_from_generator');
    if (!fromGen) return;
    try {
      const { sequence: genSeq, colors, mode: genMode, image: imgData } = JSON.parse(fromGen);
      localStorage.removeItem('ck_from_generator');
      localStorage.setItem('ck_has_sequence', '1');

      if (genSeq && genSeq.length > 0) {
        const seq = genSeq.map((item, i) => {
          // Поддерживаем оба формата: старый (число) и новый ({nail, colorIndex})
          const nailIdx = (typeof item === 'object' && item !== null) ? item.nail : item;
          const colorIdx = (typeof item === 'object' && item !== null) ? (item.colorIndex ?? 3) : 3;
          // Получаем цвет нити из данных генератора
          const colorDef = colors ? colors[colorIdx] : null;
          const color = colorDef ? colorDef.rgb : [0, 0, 0];
          const value = nailIdx + 1; // 0-based → 1-based
          const prevItem = i > 0 ? seq[i-1] : null;
          const isColorChange = prevItem ? !prevItem.color.every((c, ci) => c === color[ci]) : false;
          return { value, color, isColorChange };
        });
        setSequence(seq);
        setCurrentIndex(0);
        setRemainingSteps(0);
        stepCountRef.current = 0;
        goalReachedRef.current = false;
        speak(seq[0]);
      }

      // Загружаем картинку как подложку
      if (imgData) {
        const img = new Image();
        img.onload = () => { loadedImgRef.current = img; setCircleImage(imgData); };
        img.src = imgData;
      }
    } catch(e) { console.error('Ошибка загрузки из генератора:', e); }
  }, []);

  useEffect(() => {
    saveToStorage({ sequence, currentIndex, speedMultiplier, targetSteps, findStep,
      savedStates, remainingSteps, showNextLine, circleImage, imageOpacity });
  }, [sequence, currentIndex, speedMultiplier, targetSteps, findStep,
      savedStates, remainingSteps, showNextLine, circleImage, imageOpacity]);

  const fmt = (s) => {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sc = s%60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
  };

  const calcElapsed = () => Math.round(currentIndex * (6 - speedMultiplier) / 1.1);

  const moveSteps = (steps) => {
    setCurrentIndex(prev => {
      const next = Math.max(0, Math.min(sequenceRef.current.length-1, prev+steps));
      speak(sequenceRef.current[next]);
      return next;
    });
  };

  useEffect(() => {
    const onKey = (e) => {
      if (!sequenceRef.current.length) return;
      if (e.key==='ArrowRight'&&!e.ctrlKey){e.preventDefault();moveSteps(1);}
      else if(e.key==='ArrowLeft'&&!e.ctrlKey){e.preventDefault();moveSteps(-1);}
      else if(e.key===' '){e.preventDefault();setIsPlaying(p=>!p);}
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const getSector = (n) => { if(!n)return''; if(n<=65)return'D'; if(n<=130)return'C'; if(n<=195)return'A'; return'B'; };
  const getPos    = (n) => { if(!n)return 0; const b={D:1,C:66,A:131,B:196}; return n-b[getSector(n)]+1; };
  const getAngle  = (sec,pos) => { const b={A:Math.PI,B:Math.PI*1.5,C:Math.PI*0.5,D:0}; return b[sec]+(pos-1)*(Math.PI*0.5/65); };
  const colorName = ([r,g,b]) => {
    if(r===0&&g===0&&b===0)return'чёрный';
    if(r===255&&g===255&&b===255)return'белый';
    if(r===0&&g===0&&b===255)return'синий';
    if(r===255&&g===255&&b===0)return'жёлтый';
    if(r===0&&g===255&&b===255)return'голубой';
    return'розовый';
  };
  const speak = (item) => {
    if(!item)return;
    const t = item.isColorChange
      ? `${colorName(item.color)}, ${getSector(item.value)}${getPos(item.value)}`
      : `${getSector(item.value)}${getPos(item.value)}`;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t); u.lang='ru-RU';
    window.speechSynthesis.speak(u);
  };

  const parseFile = (text) => {
    const lines=text.split('\n'); const temp=[]; let color=[0,0,0],hasZero=false;
    lines.forEach(line=>{
      line=line.trim(); if(!line)return;
      if(line.startsWith('Thread:')){const m=line.match(/\[(\d+),\s*(\d+),\s*(\d+)\]/);if(m)color=[+m[1],+m[2],+m[3]];}
      else{
        const nums=line.split(/[\s,]+/).map(Number).filter(n=>!isNaN(n));
        if(nums.some(n=>n===0))hasZero=true;
        nums.forEach(n=>temp.push({value:hasZero?n+1:n,color:[...color],isColorChange:temp.length>0&&!temp[temp.length-1].color.every((c,i)=>c===color[i])}));
      }
    });
    return temp;
  };

  const handleFileUpload = async (e) => {
    const file=e.target.files[0]; if(!file)return;
    const text=await file.text(); const seq=parseFile(text);
    setSequence(seq); setCurrentIndex(0); setIsPlaying(false);
    setRemainingSteps(targetSteps); stepCountRef.current=0; goalReachedRef.current=false;
    if(seq.length>0)speak(seq[0]);
  };

  const handleImageUpload = (e) => {
    const file=e.target.files[0]; if(!file)return;
    const r=new FileReader();
    r.onload=(ev)=>{const img=new Image();img.onload=()=>{loadedImgRef.current=img;setCircleImage(ev.target.result);};img.src=ev.target.result;};
    r.readAsDataURL(file);
  };

  const saveProgress = () => {
    const s={id:Date.now(),currentIndex,findStep,targetSteps,remainingSteps,sequenceLength:sequence.length,timestamp:new Date().toISOString()};
    setSavedStates(prev=>[s,...prev].slice(0,20));
  };

  const loadProgress = (s) => {
    setCurrentIndex(s.currentIndex); setFindStep(s.findStep||1);
    setTargetSteps(s.targetSteps); setRemainingSteps(s.remainingSteps);
    setIsPlaying(false); stepCountRef.current=s.targetSteps-s.remainingSteps; goalReachedRef.current=false;
  };

  const stopAutoPlay = () => {
    if(playIntervalRef.current){clearInterval(playIntervalRef.current);playIntervalRef.current=null;}
  };

  const checkGoal = () => {
    if(targetSteps>0){
      stepCountRef.current+=1;
      setRemainingSteps(targetSteps-stepCountRef.current);
      if(stepCountRef.current>=targetSteps){
        setIsPlaying(false); stopAutoPlay(); goalReachedRef.current=true;
        setGoalMessage(true);
        setTimeout(()=>setGoalMessage(false), 4000);
      }
    }
  };

  const startAutoPlay = () => {
    if(playIntervalRef.current)return;
    if(goalReachedRef.current&&targetSteps>0){stepCountRef.current=0;setRemainingSteps(targetSteps);goalReachedRef.current=false;}
    const delay=(6-speedMultiplier)/1.1*1000;
    playIntervalRef.current=setInterval(()=>{
      setCurrentIndex(prev=>{
        const next=prev+1;
        if(next>=sequenceRef.current.length){setIsPlaying(false);stopAutoPlay();return prev;}
        if(sequenceRef.current[next].isColorChange){setIsPlaying(false);stopAutoPlay();}
        checkGoal();
        speak(sequenceRef.current[next]);
        return next;
      });
    },delay);
  };

  useEffect(()=>{
    if(isPlaying){if(sequence[currentIndex])speak(sequence[currentIndex]);startAutoPlay();}
    else stopAutoPlay();
    return stopAutoPlay;
  },[isPlaying,speedMultiplier]);

  const rgbHex   = (c) => '#'+c.map(v=>v.toString(16).padStart(2,'0')).join('');
  const dimColor = (c,f=0.7) => c.map(v=>Math.floor(v+(255-v)*(1-f)));
  const stepLabel= (item) => item?`${getSector(item.value)}${getPos(item.value)}`:'';

  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas)return;
    const vw=Math.min(window.innerWidth,440);
    canvas.width=vw-24; canvas.height=canvas.width;
    const ctx=canvas.getContext('2d');
    const w=canvas.width,h=canvas.height,cx=w/2,cy=h/2;
    const radius=Math.min(w,h)/2-14;

    ctx.clearRect(0,0,w,h);
    ctx.beginPath(); ctx.arc(cx,cy,radius,0,2*Math.PI); ctx.fillStyle='white'; ctx.fill();

    if(sequence.length>0){
      ctx.globalAlpha=0.7;
      for(let i=0;i<currentIndex;i++){
        if(i>=sequence.length-1)break;
        const a1=getAngle(getSector(sequence[i].value),getPos(sequence[i].value));
        const a2=getAngle(getSector(sequence[i+1].value),getPos(sequence[i+1].value));
        ctx.beginPath(); ctx.strokeStyle=rgbHex(dimColor(sequence[i+1].color,0.6)); ctx.lineWidth=0.2;
        ctx.moveTo(cx+radius*Math.cos(a1),cy+radius*Math.sin(a1));
        ctx.lineTo(cx+radius*Math.cos(a2),cy+radius*Math.sin(a2)); ctx.stroke();
      }
      ctx.globalAlpha=1;
    }

    if(circleImage&&imageOpacity>0&&loadedImgRef.current){
      const img=loadedImgRef.current;
      const  (...)
