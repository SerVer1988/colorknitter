<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ColorKnitter</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="apple-touch-icon" href="icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="ColorKnitter" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
    if (localStorage.getItem('ck_from_generator')) {
      localStorage.removeItem('ck_state_v1');
    }
    if (!localStorage.getItem('ck_has_sequence') && !localStorage.getItem('ck_from_generator')) {
      window.location.replace('generator.html');
    }
    function unlockSpeech() {
      const u = new SpeechSynthesisUtterance(''); u.volume = 0;
      window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
      document.removeEventListener('touchstart', unlockSpeech);
      document.removeEventListener('click', unlockSpeech);
    }
    document.addEventListener('touchstart', unlockSpeech);
    document.addEventListener('click', unlockSpeech);
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #0a0a0a; font-family: Arial, sans-serif; color: white; }
    body { display: flex; justify-content: center; align-items: flex-start; }
    #root { width: 100%; max-width: 440px; min-height: 100vh; display: flex; flex-direction: column; padding: 0 0 110px 0; }

    .logo-row { display: flex; justify-content: center; align-items: center; padding: 8px 0 4px; position: relative; }
    .logo-row img { height: 36px; width: auto; border-radius: 8px; }
    .logo-back { position: absolute; left: 12px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }

    .status-box { margin: 16px 12px; border: 2.5px solid #fff; border-radius: 999px; padding: 10px 20px; text-align: center; font-size: 18px; font-weight: 700; color: #fff; }

    .speed-row { display: flex; justify-content: center; gap: 6px; margin: 16px 12px; align-items: center; }
    .speed-btn { flex: 1; padding: 7px 0; border-radius: 999px; border: 2.5px solid transparent; background: transparent; color: #aaa; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .speed-btn.active { border-color: #fff; color: #fff; }

    .canvas-wrap { display: flex; justify-content: center; padding: 16px 12px; position: relative; }
    canvas { border-radius: 50%; display: block; }
    .sector-labels { position: absolute; top: 16px; left: 12px; right: 12px; bottom: 16px; pointer-events: none; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .sector-label { font-size: 2rem; font-weight: 900; color: white; text-shadow: 0 0 6px black, 0 0 3px black; display: flex; }
    .sector-label.tl { align-items: flex-start; justify-content: flex-start; padding: 10px 0 0 10px; }
    .sector-label.tr { align-items: flex-start; justify-content: flex-end; padding: 10px 10px 0 0; }
    .sector-label.bl { align-items: flex-end; justify-content: flex-start; padding: 0 0 10px 10px; }
    .sector-label.br { align-items: flex-end; justify-content: flex-end; padding: 0 10px 10px 0; }

    .steps-row { display: flex; justify-content: center; align-items: center; gap: 6px; margin: 16px 12px; }
    .step-item { text-align: center; font-weight: bold; }
    .step-item.cur { border: 2px solid var(--step-border, #EFCA46); border-radius: 12px; padding: 2px 8px; color: var(--step-color, #EFCA46) !important; }

    .color-change-banner { margin: 0 12px 8px; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; animation: bannerPop 0.3s ease; border: 2px solid var(--thread-color, #fff); background: rgba(255,255,255,0.06); }
    @keyframes bannerPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .color-change-dot { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; }
    .color-change-text { font-size: 14px; font-weight: 700; line-height: 1.4; }
    .color-change-text .color-name { font-size: 18px; color: var(--thread-color, #fff); }

    .opacity-slider-row { display: flex; align-items: center; gap: 8px; margin: 0 12px 8px; }

    .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 440px; padding: 10px 20px 24px; background: #1a1a1a; border-top: 1px solid #2a2a2a; border-radius: 24px 24px 0 0; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    .bar-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, opacity 0.15s; }
    .bar-btn:active { transform: scale(0.88); }
    .bar-btn:disabled { opacity: 0.3; }
    .bar-btn img { width: 52px; height: 52px; border-radius: 50%; }
    .bar-btn.play img { width: 68px; height: 68px; }
    .bar-btn.active-yellow img {
      filter: brightness(0) saturate(100%) invert(83%) sepia(50%) saturate(600%) hue-rotate(5deg) brightness(1.05);
    }

    .settings-panel { display: none; position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); width: calc(100% - 24px); max-width: 416px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 16px; z-index: 99; max-height: 70vh; overflow-y: auto; }
    .settings-panel.open { display: flex; flex-direction: column; gap: 14px; }

    input[type=range] { width: 100%; accent-color: #EFCA46; }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #ccc; }
    .toggle-switch { position: relative; width: 40px; height: 24px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #444; border-radius: 999px; cursor: pointer; transition: background 0.2s; }
    .toggle-slider:before { content:''; position:absolute; width:16px; height:16px; left:4px; top:4px; background:white; border-radius:50%; box-shadow:0 1px 3px rgba(0,0,0,.4); transition:transform 0.2s; }
    input:checked + .toggle-slider { background: #EFCA46; }
    input:checked + .toggle-slider:before { transform: translateX(16px); background: black; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .s-input-label { font-size: 12px; color: #aaa; margin-bottom: 4px; display: block; }
    input[type=number] { width: 100%; background: #111; border: 1.5px solid #333; border-radius: 8px; padding: 7px; text-align: center; font-size: 15px; color: white; outline: none; }

    .s-btn { width: 100%; padding: 10px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
    .s-btn-outline { background: transparent; border: 1.5px solid #444; color: #ccc; }
    .s-btn-primary { background: #EFCA46; color: black; }
    .s-btn-row { display: flex; gap: 8px; }
    .s-btn-row .s-btn { flex: 1; }
    .s-btn-secondary { background: #222; color: #ccc; border: 1.5px solid #333; }

    /* поиск позиции */
    .search-row { display: flex; gap: 8px; align-items: stretch; }
    .search-input { flex: 1; background: #111; border: 1.5px solid #333; border-radius: 8px; padding: 7px 10px; font-size: 14px; color: white; outline: none; min-width: 0; }
    .search-input:focus { border-color: #EFCA46; }
    .search-input::placeholder { color: #555; }
    .search-result { font-size: 12px; margin-top: 5px; padding: 5px 10px; border-radius: 6px; }
    .search-result.found    { color: #EFCA46; background: rgba(239,202,70,0.1);  border: 1px solid rgba(239,202,70,0.3); }
    .search-result.not-found{ color: #f87171; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); }

    .saved-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
    .saved-item { background: #111; border: 1px solid #2a2a2a; border-radius: 10px; padding: 8px 10px; font-size: 12px; }
    .saved-item-top { display: flex; justify-content: space-between; color: #888; margin-bottom: 6px; }
    .saved-item-btns { display: flex; justify-content: flex-end; gap: 8px; }
    .s-btn-sm { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
    .s-btn-sm-ol { background: transparent; border: 1px solid #444; color: #ccc; }
    .s-btn-sm-del { background: #dc2626; color: white; }

    .divider { border: none; border-top: 1px solid #2a2a2a; }
    .goal-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #EFCA46; color: black; font-size: 28px; font-weight: 900; padding: 20px 36px; border-radius: 20px; z-index: 200; box-shadow: 0 4px 32px rgba(0,0,0,0.5); animation: popIn 0.3s ease; pointer-events: none; }
    @keyframes popIn { from { transform: translate(-50%,-50%) scale(0.7); opacity:0; } to { transform: translate(-50%,-50%) scale(1); opacity:1; } }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const STORAGE_KEY = 'ck_state_v1';
const SPEEDS = [0.5, 1, 1.5, 2, 2.5, 3];
const THREAD_COLORS = [
  { id: 'Y', name: 'Жёлтый',  rgb: [255, 220,   0], hex: '#ffdc00' },
  { id: 'C', name: 'Голубой', rgb: [  0, 183, 235], hex: '#00b7eb' },
  { id: 'M', name: 'Розовый', rgb: [255,   0, 144], hex: '#ff0090' },
  { id: 'K', name: 'Чёрный',  rgb: [  0,   0,   0], hex: '#000000' },
  { id: 'W', name: 'Белый',   rgb: [255, 255, 255], hex: '#ffffff' },
];

function saveToStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); return; } catch(e) {}
  if (data.circleImage) {
    try {
      const img = new Image(); img.src = data.circleImage;
      const c = document.createElement('canvas'); c.width = 400; c.height = 400;
      c.getContext('2d').drawImage(img, 0, 0, 400, 400);
      localStorage.setItem(STORAGE_KEY, JSON.stringify({...data, circleImage: c.toDataURL('image/jpeg', 0.5)}));
      return;
    } catch(e) {}
  }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({...data, circleImage: null})); } catch(_) {}
}

function loadFromStorage() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (!s) return null;
    const data = JSON.parse(s);
    if (data.sequence && data.sequence.length > 0) {
      const first = data.sequence[0];
      if (!first.value || isNaN(first.value)) { localStorage.removeItem(STORAGE_KEY); return null; }
    }
    return data;
  } catch(_) { return null; }
}

function ColorKnitter() {
  const restored = loadFromStorage();
  const [sequence, setSequence]               = useState(restored?.sequence || []);
  const [currentIndex, setCurrentIndex]       = useState(restored?.currentIndex || 0);
  const [isPlaying, setIsPlaying]             = useState(false);
  const [speedMultiplier, setSpeedMultiplier] = useState(restored?.speedMultiplier || 1);
  const [targetSteps, setTargetSteps]         = useState(restored?.targetSteps || 0);
  const [findStep, setFindStep]               = useState(restored?.findStep || 1);
  const [savedStates, setSavedStates]         = useState(restored?.savedStates || []);
  const [remainingSteps, setRemainingSteps]   = useState(restored?.remainingSteps || 0);
  const [showNextLine, setShowNextLine]       = useState(restored?.showNextLine || false);
  const [circleImage, setCircleImage]         = useState(restored?.circleImage || null);
  const [imageOpacity, setImageOpacity]       = useState(restored?.imageOpacity ?? 0.55);
  const [showSettings, setShowSettings]       = useState(false);
  const [showSaved, setShowSaved]             = useState(false);
  const [radioPlaying, setRadioPlaying]       = useState(false);
  const [goalMessage, setGoalMessage]         = useState(false);
  const [isColorMode, setIsColorMode]         = useState(restored?.isColorMode || false);
  const [colorChangeBanner, setColorChangeBanner] = useState(null);
  // поиск позиции
  const [searchInput, setSearchInput]   = useState('');
  const [searchResult, setSearchResult] = useState(null); // null | {found, text}

  const fileInputRef    = useRef(null);
  const imageInputRef   = useRef(null);
  const canvasRef       = useRef(null);
  const playIntervalRef = useRef(null);
  const stepCountRef    = useRef(0);
  const goalReachedRef  = useRef(false);
  const loadedImgRef    = useRef(null);
  const sequenceRef     = useRef(sequence);
  const audioRef        = useRef(null);
  const settingsPanelRef = useRef(null);
  const settingsBtnRef   = useRef(null);

  sequenceRef.current = sequence;

  const getCurrentThread = useCallback((idx = currentIndex) => {
    const item = sequence[idx];
    if (!item) return THREAD_COLORS[3];
    return THREAD_COLORS[item.colorIndex ?? 3] || THREAD_COLORS[3];
  }, [sequence, currentIndex]);

  const currentThread = getCurrentThread();
  const isBlackThread = currentThread?.id === 'K';
  const threadHex = (!isColorMode && isBlackThread) ? '#EFCA46' : (currentThread?.hex || '#EFCA46');

  useEffect(() => {
    document.documentElement.style.setProperty('--step-color', threadHex);
    document.documentElement.style.setProperty('--step-border', threadHex);
    document.documentElement.style.setProperty('--thread-color', threadHex);
  }, [threadHex]);

  useEffect(() => {
    if (restored?.circleImage) {
      const img = new Image();
      img.onload = () => { loadedImgRef.current = img; };
      img.src = restored.circleImage;
    }
  }, []);

  useEffect(() => {
    audioRef.current = new Audio('https://pianosolo.streamguys1.com/live?listenerid=8b5691fb9de68c165068d33274d23ef1&awparams=companionAds%3Atrue&aw_0_req.gdpr=true&us_privacy=1YNN');
    audioRef.current.volume = 0.2;
    return () => { audioRef.current.pause(); };
  }, []);

  useEffect(() => {
    if (!audioRef.current) return;
    if (radioPlaying) audioRef.current.play().catch(() => {});
    else audioRef.current.pause();
  }, [radioPlaying]);

  // закрываем настройки при клике вне панели
  useEffect(() => {
    const handleClickOutside = (e) => {
      if (!showSettings) return;
      const panel = settingsPanelRef.current;
      const btn   = settingsBtnRef.current;
      if (panel && !panel.contains(e.target) && btn && !btn.contains(e.target)) {
        setShowSettings(false);
      }
    };
    document.addEventListener('mousedown', handleClickOutside);
    document.addEventListener('touchstart', handleClickOutside, { passive: true });
    return () => {
      document.removeEventListener('mousedown', handleClickOutside);
      document.removeEventListener('touchstart', handleClickOutside);
    };
  }, [showSettings]);

  useEffect(() => {
    const fromGen = localStorage.getItem('ck_from_generator');
    if (!fromGen) return;
    try {
      const { sequence: genSeq, colors, mode, image: imgData } = JSON.parse(fromGen);
      localStorage.removeItem('ck_from_generator');
      localStorage.setItem('ck_has_sequence', '1');
      if (genSeq && genSeq.length > 0) {
        let seq;
        const first = genSeq[0];
        if (first && typeof first === 'object' && 'nail' in first) {
          seq = genSeq.map((item, i) => {
            const prev = i > 0 ? genSeq[i-1] : null;
            const ci = item.colorIndex ?? 3;
            return { value: item.nail + 1, colorIndex: ci, isColorChange: prev !== null && (prev.colorIndex ?? 3) !== ci };
          });
        } else if (typeof first === 'number') {
          seq = genSeq.map(idx => ({ value: idx + 1, colorIndex: 3, isColorChange: false }));
        } else {
          seq = genSeq.map(item => ({ value: item.value || 1, colorIndex: item.colorIndex ?? 3, isColorChange: item.isColorChange || false }));
        }
        setSequence(seq); setCurrentIndex(0); setRemainingSteps(0);
        setIsColorMode(mode === 'color');
        stepCountRef.current = 0; goalReachedRef.current = false;
        speak(seq[0]);
      }
      if (imgData) {
        const img = new Image();
        img.onload = () => { loadedImgRef.current = img; setCircleImage(imgData); };
        img.src = imgData;
      }
    } catch(e) { console.error('Ошибка загрузки из генератора:', e); }
  }, []);

  useEffect(() => {
    saveToStorage({ sequence, currentIndex, speedMultiplier, targetSteps, findStep,
      savedStates, remainingSteps, showNextLine, circleImage, imageOpacity, isColorMode });
  }, [sequence, currentIndex, speedMultiplier, targetSteps, findStep,
      savedStates, remainingSteps, showNextLine, circleImage, imageOpacity, isColorMode]);

  const fmt = (s) => {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sc = s%60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
  };
  const calcElapsed = () => Math.round(currentIndex * (6 - speedMultiplier) / 1.1);
  const getSector = (n) => { if (!n||isNaN(n)||n<1)return'?'; if(n<=65)return'D'; if(n<=130)return'C'; if(n<=195)return'A'; return'B'; };
  const getPos    = (n) => { if (!n||isNaN(n)||n<1)return 0; const b={D:1,C:66,A:131,B:196}; const s=getSector(n); return s==='?'?0:n-b[s]+1; };
  const getAngle  = (sec,pos) => { const b={A:Math.PI,B:Math.PI*1.5,C:Math.PI*0.5,D:0}; return b[sec]+(pos-1)*(Math.PI*0.5/65); };

  const speak = (item) => {
    if (!item) return;
    const label = `${getSector(item.value)}${getPos(item.value)}`;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(label); u.lang = 'ru-RU';
    window.speechSynthesis.speak(u);
  };

  const stepLabel = (item) => {
    if(!item||!item.value||isNaN(item.value))return'---';
    const s=getSector(item.value); if(s==='?')return'---';
    return `${s}${getPos(item.value)}`;
  };

  // поиск трёх последовательных позиций
  // Вводим 3 метки в том порядке, в котором они идут в последовательности.
  // Курсор встаёт на последний элемент найденной тройки.
  const handleSearch = () => {
    const parts = searchInput.trim().toUpperCase().split(/[\s,]+/).filter(Boolean);
    if (parts.length !== 3) {
      setSearchResult({ found: false, text: 'Введите ровно 3 позиции через пробел' });
      return;
    }
    for (let i = 0; i <= sequence.length - 3; i++) {
      if (
        stepLabel(sequence[i])   === parts[2] &&
        stepLabel(sequence[i+1]) === parts[1] &&
        stepLabel(sequence[i+2]) === parts[0]
      ) {
        const target = i + 2;
        setCurrentIndex(target);
        setFindStep(target + 1);
        speak(sequence[target]);
        setSearchResult({ found: true, text: `Найдено на шаге ${target + 1}` });
        return;
      }
    }
    setSearchResult({ found: false, text: 'Не найдено' });
  };

  const moveSteps = (steps) => {
    setCurrentIndex(prev => {
      const next = Math.max(0, Math.min(sequenceRef.current.length-1, prev+steps));
      const item = sequenceRef.current[next];
      if (steps > 0 && item?.isColorChange) {
        setIsPlaying(false);
        setColorChangeBanner(THREAD_COLORS[item.colorIndex ?? 3]);
      }
      speak(item);
      return next;
    });
  };

  useEffect(() => {
    const onKey = (e) => {
      if (!sequenceRef.current.length) return;
      if (e.key==='ArrowRight'&&!e.ctrlKey){e.preventDefault();moveSteps(1);}
      else if(e.key==='ArrowLeft'&&!e.ctrlKey){e.preventDefault();moveSteps(-1);}
      else if(e.key===' '){e.preventDefault();setIsPlaying(p=>!p);}
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const stopAutoPlay = () => { if(playIntervalRef.current){clearInterval(playIntervalRef.current);playIntervalRef.current=null;} };

  const checkGoal = () => {
    if (targetSteps>0) {
      stepCountRef.current+=1; setRemainingSteps(targetSteps-stepCountRef.current);
      if (stepCountRef.current>=targetSteps) {
        setIsPlaying(false); stopAutoPlay(); goalReachedRef.current=true;
        setGoalMessage(true); setTimeout(()=>setGoalMessage(false), 4000);
      }
    }
  };

  const startAutoPlay = () => {
    if (playIntervalRef.current) return;
    if (goalReachedRef.current&&targetSteps>0){stepCountRef.current=0;setRemainingSteps(targetSteps);goalReachedRef.current=false;}
    const delay=(6-speedMultiplier)/1.1*1000;
    playIntervalRef.current=setInterval(()=>{
      setCurrentIndex(prev=>{
        const next=prev+1;
        if(next>=sequenceRef.current.length){setIsPlaying(false);stopAutoPlay();return prev;}
        const item=sequenceRef.current[next];
        if(item?.isColorChange){setIsPlaying(false);stopAutoPlay();setColorChangeBanner(THREAD_COLORS[item.colorIndex??3]);}
        checkGoal(); speak(item);
        return next;
      });
    },delay);
  };

  useEffect(()=>{
    if(isPlaying){if(sequence[currentIndex])speak(sequence[currentIndex]);startAutoPlay();}
    else stopAutoPlay();
    return stopAutoPlay;
  },[isPlaying,speedMultiplier]);

  useEffect(()=>{if(isPlaying)setColorChangeBanner(null);},[isPlaying]);

  const parseFile = (text) => {
    const lines=text.split('\n'); const temp=[]; let color=[0,0,0],hasZero=false;
    lines.forEach(line=>{
      line=line.trim(); if(!line)return;
      if(line.startsWith('Thread:')){const m=line.match(/\[(\d+),\s*(\d+),\s*(\d+)\]/);if(m)color=[+m[1],+m[2],+m[3]];}
      else{
        const nums=line.split(/[\s,]+/).map(Number).filter(n=>!isNaN(n));
        if(nums.some(n=>n===0))hasZero=true;
        nums.forEach(n=>temp.push({value:hasZero?n+1:n,colorIndex:3,isColorChange:false}));
      }
    });
    return temp;
  };

  const handleFileUpload = async (e) => {
    const file=e.target.files[0]; if(!file)return;
    const text=await file.text(); const seq=parseFile(text);
    setSequence(seq);setCurrentIndex(0);setIsPlaying(false);
    setRemainingSteps(targetSteps);stepCountRef.current=0;goalReachedRef.current=false;
    if(seq.length>0)speak(seq[0]);
  };

  const handleImageUpload = (e) => {
    const file=e.target.files[0]; if(!file)return;
    const r=new FileReader();
    r.onload=(ev)=>{const img=new Image();img.onload=()=>{loadedImgRef.current=img;setCircleImage(ev.target.result);};img.src=ev.target.result;};
    r.readAsDataURL(file);
  };

  const saveProgress = () => {
    const s={id:Date.now(),currentIndex,findStep,targetSteps,remainingSteps,sequenceLength:sequence.length,timestamp:new Date().toISOString()};
    setSavedStates(prev=>[s,...prev].slice(0,20));
  };

  const loadProgress = (s) => {
    setCurrentIndex(s.currentIndex);setFindStep(s.findStep||1);
    setTargetSteps(s.targetSteps);setRemainingSteps(s.remainingSteps);
    setIsPlaying(false);stepCountRef.current=s.targetSteps-s.remainingSteps;goalReachedRef.current=false;
  };

  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas)return;
    const vw=Math.min(window.innerWidth,440);
    canvas.width=vw-24; canvas.height=canvas.width;
    const ctx=canvas.getContext('2d');
    const w=canvas.width,h=canvas.height,cx=w/2,cy=h/2;
    const radius=Math.min(w,h)/2-14;
    ctx.clearRect(0,0,w,h);
    ctx.beginPath();ctx.arc(cx,cy,radius,0,2*Math.PI);ctx.fillStyle='white';ctx.fill();

    if(sequence.length>0){
      ctx.globalAlpha=0.7;
      for(let i=0;i<currentIndex;i++){
        if(i>=sequence.length-1)break;
        const a1=getAngle(getSector(sequence[i].value),getPos(sequence[i].value));
        const a2=getAngle(getSector(sequence[i+1].value),getPos(sequence[i+1].value));
        const thread=THREAD_COLORS[sequence[i+1].colorIndex??3];
        const [r,g,b]=thread?.rgb||[0,0,0];
        ctx.beginPath();
        ctx.strokeStyle=`rgba(${Math.floor(r*0.6+102)},${Math.floor(g*0.6+102)},${Math.floor(b*0.6+102)},0.6)`;
        ctx.lineWidth=0.2;
        ctx.moveTo(cx+radius*Math.cos(a1),cy+radius*Math.sin(a1));
        ctx.lineTo(cx+radius*Math.cos(a2),cy+radius*Math.sin(a2));ctx.stroke();
      }
      ctx.globalAlpha=1;
    }

    if(circleImage&&imageOpacity>0&&loadedImgRef.current){
      const img=loadedImgRef.current;
      const scale=(radius*2)/Math.min(img.width,img.height);
      const dw=img.width*scale,dh=img.height*scale;
      ctx.save();ctx.beginPath();ctx.arc(cx,cy,radius,0,2*Math.PI);ctx.clip();
      ctx.globalAlpha=imageOpacity;ctx.drawImage(img,cx-dw/2,cy-dh/2,dw,dh);
      ctx.globalAlpha=1;ctx.restore();
    }

    const rimR=radius+5.5,rimW=8;
    ctx.lineWidth=rimW;
    const currentSector=sequence[currentIndex]?getSector(sequence[currentIndex].value):null;
    [{start:Math.PI,end:Math.PI*1.5,color:'#b5b5b5',sector:'A'},
     {start:Math.PI*1.5,end:Math.PI*2,color:'white',sector:'B'},
     {start:0,end:Math.PI*0.5,color:'#b5b5b5',sector:'D'},
     {start:Math.PI*0.5,end:Math.PI,color:'white',sector:'C'}]
    .forEach(({start,end,color,sector})=>{
      ctx.beginPath();ctx.arc(cx,cy,rimR,start,end);
      ctx.strokeStyle=sector===currentSector?threadHex:color;ctx.stroke();
    });

    if(showNextLine&&currentIndex<sequence.length-1){
      const a1=getAngle(getSector(sequence[currentIndex].value),getPos(sequence[currentIndex].value));
      const a2=getAngle(getSector(sequence[currentIndex+1].value),getPos(sequence[currentIndex+1].value));
      const nx1=cx+radius*Math.cos(a1),ny1=cy+radius*Math.sin(a1);
      const nx2=cx+radius*Math.cos(a2),ny2=cy+radius*Math.sin(a2);
      ctx.beginPath();ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.setLineDash([6,4]);
      ctx.moveTo(nx1,ny1);ctx.lineTo(nx2,ny2);ctx.stroke();ctx.setLineDash([]);
      const na=Math.atan2(ny2-ny1,nx2-nx1),nal=14,naw=Math.PI/7;
      ctx.beginPath();ctx.moveTo(nx2,ny2);
      ctx.lineTo(nx2-nal*Math.cos(na-naw),ny2-nal*Math.sin(na-naw));
      ctx.lineTo(nx2-nal*Math.cos(na+naw),ny2-nal*Math.sin(na+naw));
      ctx.closePath();ctx.fillStyle='#3b82f6';ctx.fill();
    }

    if(currentIndex>0){
      const thread=THREAD_COLORS[sequence[currentIndex]?.colorIndex??3];
      const [lr,lg,lb]=thread?.rgb||[0,0,0];
      const a1=getAngle(getSector(sequence[currentIndex-1].value),getPos(sequence[currentIndex-1].value));
      const a2=getAngle(getSector(sequence[currentIndex].value),getPos(sequence[currentIndex].value));
      const x1=cx+radius*Math.cos(a1),y1=cy+radius*Math.sin(a1);
      const x2=cx+radius*Math.cos(a2),y2=cy+radius*Math.sin(a2);
      if(thread?.id==='W'){ctx.lineWidth=4;ctx.strokeStyle='#666';ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
      ctx.lineWidth=2;ctx.strokeStyle=`rgb(${lr},${lg},${lb})`;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      const ang=Math.atan2(y2-y1,x2-x1),al=14,aw=Math.PI/7;
      ctx.beginPath();ctx.moveTo(x2,y2);
      ctx.lineTo(x2-al*Math.cos(ang-aw),y2-al*Math.sin(ang-aw));
      ctx.lineTo(x2-al*Math.cos(ang+aw),y2-al*Math.sin(ang+aw));
      ctx.closePath();ctx.fillStyle=`rgb(${lr},${lg},${lb})`;ctx.fill();
    }

    if(sequence[currentIndex]){
      const a=getAngle(getSector(sequence[currentIndex].value),getPos(sequence[currentIndex].value));
      const thread=THREAD_COLORS[sequence[currentIndex]?.colorIndex??3];
      ctx.beginPath();
      ctx.moveTo(cx+radius*Math.cos(a),cy+radius*Math.sin(a));
      ctx.lineTo(cx+(radius+8)*Math.cos(a),cy+(radius+8)*Math.sin(a));
      ctx.strokeStyle=thread?.id==='W'?'#aaa':(thread?.id==='K'?(isColorMode?'#ffffff':'#ff0000'):(thread?.hex||'#ff0000'));
      ctx.lineWidth=2;ctx.stroke();
    }
  },[currentIndex,sequence,showNextLine,circleImage,imageOpacity,threadHex,isColorMode]);

  const renderSteps = () => {
    if(!sequence.length)return null;
    const total=5,prev=2;
    let start=Math.max(0,currentIndex-prev);
    let end=Math.min(sequence.length-1,start+total-1);
    if(end-start<total-1)start=Math.max(0,end-total+1);
    const steps=[];
    for(let i=start;i<=end;i++)steps.push({i,item:sequence[i],cur:i===currentIndex});
    return(
      <div className="steps-row">
        {steps.map(({i,item,cur})=>(
          <div key={i} className={`step-item${cur?' cur':''}`}
            style={{color:cur?threadHex:'white',fontSize:cur?'3rem':'1.6rem',minWidth:cur?80:50}}>
            {stepLabel(item)}
          </div>
        ))}
      </div>
    );
  };

  const statusParts = () => {
    if(!sequence.length)return null;
    const parts=[`${currentIndex+1}/${sequence.length} (${Math.round((currentIndex+1)/sequence.length*100)}%)`];
    if(targetSteps>0)parts.push(`Цель: ${remainingSteps}`);
    parts.push(fmt(calcElapsed()));
    return parts;
  };

  return(
    <div id="app">
      {goalMessage&&<div className="goal-msg">🎯 Цель достигнута!</div>}
      <div className="logo-row">
        <a href="generator.html" className="logo-back" onClick={()=>localStorage.removeItem('ck_has_sequence')}>
          <img src="ic_back.png" alt="назад" style={{width:36,height:36}} />
        </a>
        <img src="icon.png" alt="CK" onError={e=>e.target.style.display='none'} />
      </div>
      <div className="status-box">
        {statusParts()?statusParts().map((p,i,arr)=>(
          <span key={i}>{p}{i<arr.length-1&&<span style={{margin:'0 8px',color:'#666'}}>|</span>}</span>
        )):'Загрузите файл'}
      </div>
      <div className="speed-row">
        {SPEEDS.map(s=>(
          <button key={s} className={`speed-btn${speedMultiplier===s?' active':''}`} onClick={()=>setSpeedMultiplier(s)}>{s}x</button>
        ))}
      </div>
      <div className="canvas-wrap">
        <canvas ref={canvasRef}/>
        <div className="sector-labels">
          <div className="sector-label tl">A</div>
          <div className="sector-label tr">B</div>
          <div className="sector-label bl">C</div>
          <div className="sector-label br">D</div>
        </div>
      </div>
      {renderSteps()}
      {colorChangeBanner&&(
        <div className="color-change-banner" style={{'--thread-color':colorChangeBanner.id==='K'?'#fff':colorChangeBanner.hex}}>
          <div className="color-change-dot" style={{background:colorChangeBanner.hex,border:colorChangeBanner.id==='K'?'2px solid #fff':'none',boxShadow:`0 0 10px ${colorChangeBanner.hex}`}}/>
          <div className="color-change-text">
            <div style={{fontSize:12,color:'#aaa',marginBottom:2}}>Смените нить на</div>
            <div className="color-name" style={{color:colorChangeBanner.id==='K'?'#fff':colorChangeBanner.hex}}>{colorChangeBanner.name}</div>
          </div>
          <button onClick={()=>{setColorChangeBanner(null);setIsPlaying(true);}}
            style={{marginLeft:'auto',padding:'6px 14px',borderRadius:8,fontWeight:700,fontSize:13,cursor:'pointer',background:colorChangeBanner.id==='K'?'transparent':colorChangeBanner.hex,color:colorChangeBanner.id==='K'?'#fff':(['W','Y'].includes(colorChangeBanner.id)?'#000':'#fff'),border:colorChangeBanner.id==='K'?'2px solid #fff':'none'}}>
            Готово ▶
          </button>
        </div>
      )}
      {circleImage&&(
        <div className="opacity-slider-row">
          <span style={{fontSize:12,color:'#aaa',whiteSpace:'nowrap'}}>Фото:</span>
          <input type="range" min="0" max="1" step="0.05" value={imageOpacity} onChange={e=>setImageOpacity(Number(e.target.value))} style={{flex:1,accentColor:threadHex}}/>
          <span style={{fontSize:12,color:'#aaa',width:32,textAlign:'right'}}>{Math.round(imageOpacity*100)}%</span>
        </div>
      )}

      <div ref={settingsPanelRef} className={`settings-panel${showSettings?' open':''}`}>
        <div className="toggle-row">
          <span>Линия следующего хода</span>
          <label className="toggle-switch">
            <input type="checkbox" checked={showNextLine} onChange={e=>setShowNextLine(e.target.checked)}/>
            <span className="toggle-slider"></span>
          </label>
        </div>
        <hr className="divider"/>
        <div>
          <input ref={imageInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleImageUpload}/>
          <button className="s-btn s-btn-outline" onClick={()=>imageInputRef.current.click()}>🖼️ Загрузить фото</button>
          {circleImage&&(
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}>
              <span style={{fontSize:12,color:'#aaa',whiteSpace:'nowrap'}}>Прозрачность:</span>
              <input type="range" min="0" max="1" step="0.05" value={imageOpacity} onChange={e=>setImageOpacity(Number(e.target.value))} style={{flex:1}}/>
              <span style={{fontSize:12,color:'#aaa',width:32,textAlign:'right'}}>{Math.round(imageOpacity*100)}%</span>
            </div>
          )}
        </div>
        <hr className="divider"/>
        <div className="grid2">
          <div>
            <span className="s-input-label">Цель (шагов):</span>
            <input type="number" value={targetSteps} min={0} onChange={e=>{const v=Number(e.target.value);setTargetSteps(v);stepCountRef.current=0;setRemainingSteps(v);goalReachedRef.current=false;}}/>
          </div>
          <div>
            <span className="s-input-label">Перейти к шагу:</span>
            <input type="number" value={findStep} min={1} max={sequence.length||1}
              onChange={e=>{const v=Number(e.target.value);if(v>=1&&v<=sequence.length){setFindStep(v);setCurrentIndex(v-1);speak(sequence[v-1]);}}}/>
          </div>
        </div>
        <hr className="divider"/>

        {/* ── НОВОЕ: поиск по 3 меткам ── */}
        <div>
          <span className="s-input-label">Найти позицию по 3 меткам подряд:</span>
          <div className="search-row">
            <input
              className="search-input"
              type="text"
              placeholder="напр. A5 B12 C3"
              value={searchInput}
              onChange={e=>{ setSearchInput(e.target.value); setSearchResult(null); }}
              onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); handleSearch(); } }}
            />
            <button
              className="s-btn s-btn-primary"
              style={{width:'auto',padding:'7px 16px',flexShrink:0}}
              onClick={handleSearch}
              disabled={!sequence.length}
            >🔍</button>
          </div>
          {searchResult&&(
            <div className={`search-result ${searchResult.found?'found':'not-found'}`}>
              {searchResult.text}
            </div>
          )}
        </div>
        <hr className="divider"/>

        <div className="s-btn-row">
          <input ref={fileInputRef} type="file" accept=".txt" style={{display:'none'}} onChange={handleFileUpload}/>
          <button className="s-btn s-btn-primary" onClick={()=>fileInputRef.current.click()}>📂 Загрузить файл</button>
          <button className="s-btn s-btn-outline" onClick={saveProgress} disabled={!sequence.length}>💾 Сохранить</button>
        </div>
        <button className="s-btn s-btn-secondary" onClick={()=>setShowSaved(v=>!v)}>
          {showSaved?'Скрыть':'Показать'} сохранения ({savedStates.length})
        </button>
        {showSaved&&(
          <div className="saved-list">
            {savedStates.length===0&&<div style={{fontSize:13,color:'#666',textAlign:'center'}}>Нет сохранений</div>}
            {savedStates.map(s=>(
              <div key={s.id} className="saved-item">
                <div className="saved-item-top">
                  <span>{new Date(s.timestamp).toLocaleString()}</span>
                  <span>Шаг {s.currentIndex+1}/{s.sequenceLength||'?'}</span>
                </div>
                <div className="saved-item-btns">
                  <button className="s-btn-sm s-btn-sm-ol" onClick={()=>loadProgress(s)}>Загрузить</button>
                  <button className="s-btn-sm s-btn-sm-del" onClick={()=>setSavedStates(p=>p.filter(x=>x.id!==s.id))}>Удалить</button>
                </div>
              </div>
            ))}
          </div>
        )}
        <hr className="divider"/>
        <button className="s-btn" style={{background:'#7f1d1d',color:'#fca5a5',border:'none'}} onClick={()=>{
          if('serviceWorker' in navigator){caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).then(()=>window.location.reload(true));}
          else{window.location.reload(true);}
        }}>🔄 Очистить кеш и обновить</button>
      </div>

      <div className="bottom-bar">
        <button className={`bar-btn${radioPlaying?' active-yellow':''}`} onClick={()=>setRadioPlaying(p=>!p)}>
          <img src="ic_music.png" alt="radio"/>
        </button>
        <button className="bar-btn" onClick={()=>moveSteps(-1)} disabled={currentIndex<=0}>
          <img src="ic_back.png" alt="back"/>
        </button>
        <button className="bar-btn play" onClick={()=>setIsPlaying(p=>!p)} disabled={!sequence.length}>
          <img src={isPlaying?'ic_pause.png':'ic_play.png'} alt="play"/>
        </button>
        <button className="bar-btn" onClick={()=>moveSteps(1)} disabled={currentIndex>=sequence.length-1}>
          <img src="ic_next.png" alt="next"/>
        </button>
        <button ref={settingsBtnRef} className={`bar-btn${showSettings?' active-yellow':''}`} onClick={()=>setShowSettings(p=>!p)}>
          <img src="ic_settings.png" alt="settings"/>
        </button>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<ColorKnitter/>);
</script>
</body>
</html>
